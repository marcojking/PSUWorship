<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WM&A — End Card (9:16)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@200;300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0b0b0c; font-family: 'Source Sans 3', sans-serif; overflow: hidden; }
  #root { width: 100vw; height: 100vh; }
  .amp { color: #b45741; font-weight: 800; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="./animations.jsx"></script>

<script type="text/babel">
const { useMemo } = React;

// Subdomain transitions, each 1.1s, overlapping holds
// timeline:
// 0.0 – 0.5   : WM&A club name fades in
// 0.5 – 1.1   : wmaac.org fades in beneath
// 1.3 – 2.3   : /join    (enter 0.25, hold 0.5, exit 0.25)
// 2.3 – 3.3   : /info
// 3.3 – 4.5   : /give
// 4.5 – 5.0   : gentle settle / hold
const DURATION = 5.0;

function WordmarkWMA({ size = 120 }) {
  return (
    <div style={{
      fontFamily: "'Source Sans 3', sans-serif",
      fontWeight: 700,
      fontSize: size,
      letterSpacing: "0.04em",
      color: "#003049",
      lineHeight: 1,
      textTransform: "uppercase",
    }}>
      WM<span className="amp" style={{ margin: "0 0.02em" }}>&amp;</span>A
    </div>
  );
}

function FullName({ size = 34 }) {
  return (
    <div style={{
      fontFamily: "'Source Sans 3', sans-serif",
      fontWeight: 400,
      fontSize: size,
      letterSpacing: "0.22em",
      color: "rgba(0,48,73,0.55)",
      textTransform: "uppercase",
      textAlign: "center",
      lineHeight: 1.25,
    }}>
      <div>Worship Music</div>
      <div><span className="amp" style={{ fontWeight: 700, letterSpacing: 0, margin: "0 0.12em" }}>&amp;</span> Arts</div>
    </div>
  );
}

function Url({ size = 44 }) {
  return (
    <div style={{
      fontFamily: "'Source Sans 3', sans-serif",
      fontWeight: 300,
      fontSize: size,
      letterSpacing: "0.08em",
      color: "#003049",
      lineHeight: 1,
    }}>
      wmaac.org
    </div>
  );
}

// A subdomain slot that animates in/out
function Subdomain({ path, start, end }) {
  const t = useTime();
  const enter = 0.28;
  const exit = 0.28;
  let opacity = 0, y = 24;

  if (t >= start && t < start + enter) {
    const k = Easing.easeOutCubic((t - start) / enter);
    opacity = k;
    y = 24 * (1 - k);
  } else if (t >= start + enter && t < end - exit) {
    opacity = 1; y = 0;
  } else if (t >= end - exit && t < end) {
    const k = Easing.easeInCubic((t - (end - exit)) / exit);
    opacity = 1 - k;
    y = -24 * k;
  }

  if (opacity <= 0.001) return null;
  return (
    <div style={{
      position: "absolute",
      left: 0, right: 0,
      top: 0,
      textAlign: "center",
      opacity,
      transform: `translateY(${y}px)`,
      fontFamily: "'Source Sans 3', sans-serif",
      fontWeight: 600,
      fontSize: 60,
      letterSpacing: "0.02em",
      color: "#003049",
      lineHeight: 1,
    }}>
      <span style={{ color: "#b45741", fontWeight: 700 }}>/</span>{path}
    </div>
  );
}

// The slash "cursor" — a small rust underline that pulses
function Underline() {
  const t = useTime();
  // breath — gentle opacity oscillation
  const pulse = 0.55 + 0.35 * Math.sin(t * 2.0);
  return (
    <div style={{
      width: 60, height: 2,
      background: "#b45741",
      opacity: pulse,
      margin: "28px auto 0",
      borderRadius: 2,
    }} />
  );
}

function Scene() {
  const t = useTime();

  // Club name + wmaac.org fade-in
  const nameOpacity = Easing.easeOutCubic(Math.min(1, Math.max(0, t / 0.5)));
  const nameY = 18 * (1 - nameOpacity);

  const urlOpacity = Easing.easeOutCubic(Math.min(1, Math.max(0, (t - 0.5) / 0.6)));
  const urlY = 14 * (1 - urlOpacity);

  // noise texture (subtle, static, paper grain)
  const noiseUri = useMemo(() => {
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>`;
    return `url("data:image/svg+xml;utf8,${svg}")`;
  }, []);

  return (
    <div style={{
      position: "absolute", inset: 0,
      background: "#fff7eb",
      overflow: "hidden",
    }}>
      {/* paper grain */}
      <div style={{
        position: "absolute", inset: 0,
        backgroundImage: noiseUri,
        opacity: 0.04,
        mixBlendMode: "multiply",
        pointerEvents: "none",
      }} />

      {/* faint vignette */}
      <div style={{
        position: "absolute", inset: 0,
        background: "radial-gradient(ellipse at center, transparent 55%, rgba(0,48,73,0.05) 100%)",
        pointerEvents: "none",
      }} />

      {/* top block: full name */}
      <div style={{
        position: "absolute",
        left: 0, right: 0,
        top: "13%",
        textAlign: "center",
        opacity: nameOpacity,
        transform: `translateY(${nameY}px)`,
      }}>
        <FullName size={34} />
      </div>

      {/* eyebrow: club club, at PSU */}
      <div style={{
        position: "absolute",
        left: 0, right: 0,
        top: "24%",
        textAlign: "center",
        opacity: nameOpacity * 0.9,
        fontFamily: "'Source Sans 3', sans-serif",
        fontSize: 16,
        letterSpacing: "0.35em",
        textTransform: "uppercase",
        color: "#b45741",
        fontWeight: 600,
      }}>
        Club · Penn State
      </div>

      {/* big acronym */}
      <div style={{
        position: "absolute",
        left: 0, right: 0,
        top: "33%",
        display: "flex", justifyContent: "center",
        opacity: nameOpacity,
        transform: `translateY(${nameY}px)`,
      }}>
        <WordmarkWMA size={180} />
      </div>

      {/* hairline rule */}
      <div style={{
        position: "absolute",
        left: "50%",
        top: "54%",
        width: 80,
        height: 1,
        background: "rgba(0,48,73,0.25)",
        transform: `translateX(-50%) scaleX(${nameOpacity})`,
        transformOrigin: "center",
      }} />

      {/* url + /path stack */}
      <div style={{
        position: "absolute",
        left: 0, right: 0,
        top: "60%",
        textAlign: "center",
        opacity: urlOpacity,
        transform: `translateY(${urlY}px)`,
      }}>
        <Url size={46} />
      </div>

      {/* subdomain slot (absolute-positioned so they can animate independently) */}
      <div style={{
        position: "absolute",
        left: 0, right: 0,
        top: "70%",
        height: 80,
      }}>
        <Subdomain path="join" start={1.3} end={2.4} />
        <Subdomain path="info" start={2.4} end={3.5} />
        <Subdomain path="give" start={3.5} end={5.0} />
      </div>

      {/* pulsing underline */}
      <div style={{
        position: "absolute",
        left: 0, right: 0,
        top: "82%",
        opacity: urlOpacity,
      }}>
        <Underline />
      </div>

      {/* bottom: handle */}
      <div style={{
        position: "absolute",
        left: 0, right: 0,
        bottom: "9%",
        textAlign: "center",
        opacity: urlOpacity * 0.7,
        fontFamily: "'Source Sans 3', sans-serif",
        fontSize: 18,
        letterSpacing: "0.3em",
        textTransform: "uppercase",
        color: "rgba(0,48,73,0.5)",
        fontWeight: 400,
      }}>
        @wmaac
      </div>
    </div>
  );
}

function App() {
  return (
    <Stage width={1080} height={1920} duration={DURATION} background="#fff7eb" fps={60}>
      <Scene />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
