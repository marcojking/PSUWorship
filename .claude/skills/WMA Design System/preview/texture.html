<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fabric Texture</title>
<style>
  html, body { margin:0; padding:0; }
  body { background: #1a1714; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; color: #f5ead6; font-family: 'Source Sans 3', sans-serif; }
  .wrap { width: 100%; height: 200px; position: relative; overflow: hidden; }
  .wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center bottom; }
  .label { position: absolute; left: 16px; bottom: 14px; font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; text-shadow: 0 1px 4px rgba(0,0,0,0.6); z-index: 2; }
</style>
</head>
<body>
  <div class="wrap">
    <img src="../assets/imagery/fabric-texture.png" alt=""/>

  </div>
</body>
</html>
