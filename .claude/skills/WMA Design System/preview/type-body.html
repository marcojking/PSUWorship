<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--navy); padding: 20px 28px; font-family: var(--font-body); }
  .spec { display: flex; gap: 18px; align-items: baseline; margin-bottom: 10px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: rgba(0,48,73,0.45); width: 170px; flex-shrink: 0; }
  .sample { color: var(--navy); }
</style>
</head>
<body>
  <div class="spec">
    <div class="tag">Source Sans 600 / 20</div>
    <div class="sample" style="font-size:20px; font-weight:600;">Harmony Trainer</div>
  </div>
  <div class="spec">
    <div class="tag">Source Sans 400 / 16 / 1.65</div>
    <div class="sample" style="font-size:16px; font-weight:400; line-height:1.65; max-width:420px; color:rgba(0,48,73,0.80);">Practice singing vocal harmonies with real-time pitch feedback.</div>
  </div>
  <div class="spec">
    <div class="tag">Source Sans 300 / 16 / 1.65</div>
    <div class="sample" style="font-size:16px; font-weight:300; line-height:1.65; max-width:420px; color:rgba(0,48,73,0.55);">God is working at Penn State and music is playing a huge role.</div>
  </div>
  <div class="spec">
    <div class="tag">Source Sans 400 / 12 / 0.6 op</div>
    <div class="sample" style="font-size:12px; color:rgba(0,48,73,0.40);">4 songs · Key of G</div>
  </div>
</body>
</html>
