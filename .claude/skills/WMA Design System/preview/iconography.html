<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--cream); padding: 22px 28px; font-family: var(--font-body); color: var(--navy); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .tile { width: 64px; height: 64px; background: var(--navy); color: var(--cream); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: rgba(0,48,73,0.5); }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="tile">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="3" height="4" rx="1" fill="#fff7eb"/><rect x="8" y="6" width="3" height="12" rx="1" fill="#fff7eb"/><rect x="13" y="8" width="3" height="8" rx="1" fill="#fff7eb"/><rect x="18" y="5" width="3" height="14" rx="1" fill="#fff7eb"/></svg>
    </div><div class="cap">harmony</div></div>
    <div class="cell"><div class="tile">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="#fff7eb" stroke-width="2" fill="none"/><line x1="8" y1="8" x2="16" y2="8" stroke="#fff7eb" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="12" x2="16" y2="12" stroke="#fff7eb" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="16" x2="13" y2="16" stroke="#fff7eb" stroke-width="2" stroke-linecap="round"/></svg>
    </div><div class="cap">setlist</div></div>
    <div class="cell"><div class="tile">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z" stroke="#fff7eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="7" r="1.5" fill="#fff7eb"/></svg>
    </div><div class="cap">merch</div></div>
    <div class="cell"><div class="tile" style="background:#b45741;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="#fff7eb" stroke-width="2"/><path d="M2 21v-1a7 7 0 0 1 11.95-4.95" stroke="#fff7eb" stroke-width="2" stroke-linecap="round" fill="none"/><line x1="19" y1="13" x2="19" y2="21" stroke="#fff7eb" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="17" x2="23" y2="17" stroke="#fff7eb" stroke-width="2" stroke-linecap="round"/></svg>
    </div><div class="cap">join</div></div>
    <div class="cell"><div class="tile" style="background:transparent; border:1px dashed rgba(0,48,73,0.3); color:rgba(0,48,73,0.4); font-family:var(--font-mono); font-size:10px;">1.8 px</div><div class="cap">stroke</div></div>
  </div>
</body>
</html>
