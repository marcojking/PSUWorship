<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--cream); padding: 22px 28px; font-family: var(--font-body); color: var(--navy); }
  .tool-card {
    background: #fff; border-radius: 16px; border: 1px solid rgba(0,48,73,0.10);
    padding: 18px; display: flex; gap: 16px; align-items: center; transition: all 200ms;
  }
  .tool-card:hover { border-color: rgba(0,48,73,0.3); box-shadow: 0 12px 32px rgba(0,48,73,0.14); }
  .tool-icon {
    width: 56px; height: 56px; background: var(--navy); color: var(--cream);
    border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .tool-title { font-size: 18px; font-weight: 700; margin: 0 0 2px 0; }
  .tool-sub { font-size: 13px; color: rgba(0,48,73,0.55); margin: 0; }
  .tool-arrow { opacity: 0.3; font-size: 22px; margin-left: auto; }
</style>
</head>
<body>
  <div class="tool-card">
    <div class="tool-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="3" height="4" rx="1" fill="#fff7eb"/><rect x="8" y="6" width="3" height="12" rx="1" fill="#fff7eb"/><rect x="13" y="8" width="3" height="8" rx="1" fill="#fff7eb"/><rect x="18" y="5" width="3" height="14" rx="1" fill="#fff7eb"/></svg>
    </div>
    <div>
      <div class="tool-title">Harmony Trainer</div>
      <div class="tool-sub">Practice singing vocal harmonies with real-time pitch feedback</div>
    </div>
    <div class="tool-arrow">→</div>
  </div>
</body>
</html>
