<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Eyebrow & Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--navy); padding: 22px 28px; font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 18px; margin-bottom: 14px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: rgba(0,48,73,0.45); width: 170px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="row">
    <div class="tag">Eyebrow · rust · 0.7rem / 0.2em</div>
    <div style="font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:#b45741;">WM&amp;A Club</div>
  </div>
  <div class="row">
    <div class="tag">Eyebrow · muted</div>
    <div style="font-size:11px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:rgba(0,48,73,0.40);">Team Positions</div>
  </div>
  <div class="row">
    <div class="tag">WM&amp;A wordmark · acronym</div>
    <div style="font-size:32px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; line-height:1;">
      WM<span style="color:#b45741; font-weight:800; margin:0 0.02em;">&amp;</span>A
    </div>
  </div>
  <div class="row">
    <div class="tag">Gentle &amp; Lowly · wordmark</div>
    <div style="background:#1a1714; color:#f5ead6; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:200; letter-spacing:0.32em; text-transform:uppercase;">
      GENTLE <span style="color:#c4793a; font-weight:700; margin:0 0.15em; letter-spacing:0;">&amp;</span> LOWLY
    </div>
  </div>
</body>
</html>
