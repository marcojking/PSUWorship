<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing & Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--cream); color: var(--navy); padding: 20px 28px; font-family: var(--font-body); font-size: 12px; }
  .section { margin-bottom: 14px; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #b45741; margin-bottom: 8px; }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .space-box { background: rgba(0,48,73,0.10); height: 40px; display:flex; align-items:flex-end; justify-content:center; font-family: var(--font-mono); font-size: 10px; padding-bottom:4px; color: rgba(0,48,73,0.6); }
  .radius-box { width: 60px; height: 60px; background: var(--navy); color: var(--cream); display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-size: 10px; }
</style>
</head>
<body>
  <div class="section">
    <div class="lbl">Spacing scale (px)</div>
    <div class="row">
      <div class="space-box" style="width:4px;">4</div>
      <div class="space-box" style="width:8px;">8</div>
      <div class="space-box" style="width:12px;">12</div>
      <div class="space-box" style="width:16px;">16</div>
      <div class="space-box" style="width:24px;">24</div>
      <div class="space-box" style="width:32px;">32</div>
      <div class="space-box" style="width:48px;">48</div>
      <div class="space-box" style="width:64px;">64</div>
    </div>
  </div>
  <div class="section">
    <div class="lbl">Radii</div>
    <div class="row">
      <div class="radius-box" style="border-radius:6px;">6</div>
      <div class="radius-box" style="border-radius:12px;">12</div>
      <div class="radius-box" style="border-radius:16px;">16</div>
      <div class="radius-box" style="border-radius:24px;">24</div>
      <div class="radius-box" style="border-radius:9999px;">pill</div>
    </div>
  </div>
</body>
</html>
