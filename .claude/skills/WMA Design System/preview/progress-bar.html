<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Progress Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--cream); padding: 34px 28px; font-family: var(--font-body); color: var(--navy); }
  .bar { position: relative; width: 100%; height: 40px; border-radius: 9999px; overflow: hidden; background: rgba(0,48,73,0.1); }
  .fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--navy); }
  .glow { position: absolute; top: 0; bottom: 0; width: 45%; pointer-events: none; background: linear-gradient(90deg, rgba(127,160,175,0.32) 0%, rgba(127,160,175,0.10) 40%, transparent 100%); border-radius: 0 9999px 9999px 0; }
  .labels { position: absolute; inset: 0; display: flex; pointer-events: none; }
  .step { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="bar">
    <div class="fill" style="width:50%;"></div>
    <div class="glow" style="left:50%;"></div>
    <div class="labels">
      <div class="step" style="color:#fff7eb;">Roles</div>
      <div class="step" style="color:#fff7eb;">About You</div>
      <div class="step" style="color:rgba(0,48,73,0.3);">Your Story</div>
      <div class="step" style="color:rgba(0,48,73,0.3);">Follow Up</div>
    </div>
  </div>
</body>
</html>
