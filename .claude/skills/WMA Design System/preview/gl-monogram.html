<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G&L Monogram</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
  body {
    background: #1a1714;
    display: flex; align-items: center; justify-content: center;
    aspect-ratio: 1 / 1;
  }
  .mark {
    font-family: var(--font-body, 'Source Sans 3', sans-serif);
    font-weight: 700;
    font-size: 34vmin;
    letter-spacing: 0.04em;
    line-height: 1;
    text-transform: uppercase;
    color: #f5ead6;
  }
  .mark .amp {
    color: #c4793a;
    font-weight: 800;
    margin: 0 0.02em;
  }
</style>
</head>
<body>
  <div class="mark">G<span class="amp">&amp;</span>L</div>
</body>
</html>
