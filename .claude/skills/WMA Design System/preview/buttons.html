<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; }
  body { background: var(--cream); padding: 28px; font-family: var(--font-body); color: var(--navy); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 22px; }
  .cell { display: flex; flex-direction: column; gap: 6px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: rgba(0,48,73,0.45); }
  .btn-primary {
    height: 48px; padding: 0 28px; border: 0; border-radius: 9999px;
    background: var(--navy); color: var(--cream);
    font-size: 13px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-primary:hover { background: var(--rust); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,48,73,0.18); }
  .btn-outline {
    height: 48px; padding: 0 28px; border: 1px solid rgba(0,48,73,0.2); border-radius: 9999px;
    background: transparent; color: var(--navy);
    font-size: 13px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-outline:hover { border-color: rgba(0,48,73,0.6); }
  .btn-tile {
    background: var(--navy); color: var(--rust);
    padding: 14px 18px; border: 0; border-radius: 10px;
    font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .btn-tile:hover { opacity: 0.9; }
  .link { font-size: 13px; color: var(--navy); opacity: 0.6; cursor: pointer; }
  .link:hover { opacity: 1; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="tag">Primary · pill · navy → rust on hover</div><button class="btn-primary">Continue</button></div>
    <div class="cell"><div class="tag">Outline · back / secondary</div><button class="btn-outline">Back</button></div>
    <div class="cell"><div class="tag">Tile · quick-action (setlist)</div><button class="btn-tile">+ Import Song</button></div>
    <div class="cell"><div class="tag">Link · 60% → 100% opacity</div><span class="link">View all (27) →</span></div>
  </div>
</body>
</html>
