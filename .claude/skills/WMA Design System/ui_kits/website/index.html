<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PSU Worship — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--cream); font-family: var(--font-body); color: var(--navy); }
  #root { min-height: 100vh; }
  /* Device-style nav tabs at top */
  .nav-bar {
    position: sticky; top: 0; z-index: 100;
    display: flex; gap: 4px;
    padding: 10px 16px;
    background: rgba(255, 247, 235, 0.9);
    border-bottom: 1px solid rgba(0, 48, 73, 0.08);
    backdrop-filter: blur(10px);
  }
  .nav-bar.on-dark { background: rgba(26, 23, 20, 0.9); border-bottom-color: #3a3228; }
  .nav-tab {
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(0, 48, 73, 0.5); padding: 8px 14px; border-radius: 9999px;
    cursor: pointer; transition: all 150ms; border: 1px solid transparent;
  }
  .nav-tab:hover { color: #003049; }
  .nav-tab.active { color: #fff7eb; background: #003049; }
  .nav-bar.on-dark .nav-tab { color: #968a78; }
  .nav-bar.on-dark .nav-tab:hover { color: #f5ead6; }
  .nav-bar.on-dark .nav-tab.active { color: #1a1714; background: #f5ead6; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./Primitives.jsx"></script>
<script type="text/babel" src="./Screens.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [screen, setScreen] = useState("home");
  const onDark = screen === "merch";

  const tabs = [
    { id: "home", label: "Home" },
    { id: "join", label: "Join" },
    { id: "setlist", label: "Setlist" },
    { id: "merch", label: "Merch" },
  ];

  const render = () => {
    switch (screen) {
      case "home":    return <HomeScreen navigate={setScreen} />;
      case "join":    return <JoinScreen navigate={setScreen} />;
      case "setlist": return <SetlistScreen navigate={setScreen} />;
      case "merch":   return <MerchScreen navigate={setScreen} />;
      case "harmony": return <HarmonyStub navigate={setScreen} />;
      default:        return <HomeScreen navigate={setScreen} />;
    }
  };

  return (
    <div data-screen-label={screen} style={{ background: onDark ? "#1a1714" : "#fff7eb", minHeight: "100vh" }}>
      <div className={`nav-bar ${onDark ? "on-dark" : ""}`}>
        {tabs.map((t) => (
          <div key={t.id} className={`nav-tab ${screen === t.id || (screen === "harmony" && t.id === "home") ? "active" : ""}`} onClick={() => setScreen(t.id)}>
            {t.label}
          </div>
        ))}
      </div>
      {render()}
    </div>
  );
}

function HarmonyStub({ navigate }) {
  return (
    <div style={{ padding: "80px 24px", textAlign: "center", color: "#003049" }}>
      <div style={{ fontFamily: "'Cormorant Garamond', serif", fontStyle: "italic", fontWeight: 600, fontSize: 44 }}>Harmony Trainer</div>
      <p style={{ fontSize: 14, color: "rgba(0,48,73,0.55)", maxWidth: 380, margin: "12px auto 32px" }}>Interactive pitch-detection module — not recreated in this kit. See <code>src/app/harmony/page.tsx</code> in the codebase.</p>
      <button onClick={() => navigate("home")} style={{ padding: "12px 28px", borderRadius: 9999, background: "#003049", color: "#fff7eb", border: 0, fontSize: 13, fontWeight: 600, letterSpacing: "0.18em", textTransform: "uppercase", cursor: "pointer", fontFamily: "inherit" }}>← Back to Tools</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
